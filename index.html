<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>receipt-math (OCaml + Core via js_of_ocaml)</title>
<style>
canvas {
  height: 256px;
  width: 256px;
  image-rendering: pixelated;
  border: 1px solid black;
  box-sizing: border-box;
}
* {
  margin: 0;
  padding: 0;
}
</style>
</head>
<body>
  <div id="loginDiv"></div>
  <div id="content"></div>
<script src="main.js"></script>
<script src="receipt_math.js"></script>
<script type="module">
  function nextFrame() {
    return new Promise(requestAnimationFrame);
  }
  setupLoginSection();
  for (let i = 0; i < 50; ++i) {
    const { c, e } = foo();
    c.addEventListener('click', ev => {
      sendCanvasToPrinter(c, e);
    });
    content.appendChild(c);
    await nextFrame();
  }
</script>
</body>
</html>
